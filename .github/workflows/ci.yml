name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crop_planner_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/crop_planner_test
      BETTER_AUTH_SECRET: test-secret-not-for-production
      BETTER_AUTH_URL: http://localhost:3001
      REVENUECAT_WEBHOOK_AUTH_HEADER: test-revenuecat-header
      ENABLE_STRIPE_EXTERNAL_LINK: 'true'
      RESEND_API_KEY: re_test_dummy
      EMAIL_FROM: noreply@cropplanner.test
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: test-bucket
      AWS_ACCESS_KEY_ID: test-key
      AWS_SECRET_ACCESS_KEY: test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: npm run typecheck

      - run: npm run db:apply-schema

      - run: npm test
